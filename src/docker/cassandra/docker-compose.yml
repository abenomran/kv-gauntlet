version: "3.8"

services:
  cassandra1:
    image: cassandra:4.1
    container_name: cassandra1
    ports:
      - "9042:9042"
    networks:
      - cassandra-net
    environment:
      - CASSANDRA_CLUSTER_NAME=consistency-lab
      - CASSANDRA_SEEDS=cassandra1

  cassandra2:
    image: cassandra:4.1
    container_name: cassandra2
    ports:
      - "9043:9042"
    networks:
      - cassandra-net
    environment:
      - CASSANDRA_CLUSTER_NAME=consistency-lab
      - CASSANDRA_SEEDS=cassandra1
    depends_on:
      - cassandra1

  cassandra3:
    image: cassandra:4.1
    container_name: cassandra3
    ports:
      - "9044:9042"
    networks:
      - cassandra-net
    environment:
      - CASSANDRA_CLUSTER_NAME=consistency-lab
      - CASSANDRA_SEEDS=cassandra1
    depends_on:
      - cassandra1

networks:
  cassandra-net:
    driver: bridge
